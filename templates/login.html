<!DOCTYPE html>
<html>

<head>

    <title>Login • IdeaNeuron</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{

            height:100vh;

            background:
                radial-gradient(circle at top left,#8b5cf6,transparent 30%),
                radial-gradient(circle at bottom right,#06b6d4,transparent 30%),
                #0b1120;

            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
        }

        .container{

            width:1000px;
            height:620px;

            background:rgba(17,24,39,0.9);

            border:1px solid rgba(255,255,255,0.05);

            border-radius:30px;

            display:flex;

            overflow:hidden;

            backdrop-filter:blur(10px);

            box-shadow:0 20px 60px rgba(0,0,0,0.4);
        }

        /* LEFT */

        .left{

            width:50%;

            padding:60px;

            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .logo{

            font-size:38px;
            font-weight:700;

            background:linear-gradient(
                to right,
                #8b5cf6,
                #06b6d4
            );

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;

            margin-bottom:30px;
        }

        .left h1{

            font-size:52px;

            line-height:1.2;

            margin-bottom:20px;
        }

        .left p{

            color:#94a3b8;

            line-height:1.8;

            margin-bottom:30px;
        }

        .feature{

            margin-bottom:15px;

            color:#cbd5e1;
        }

        /* RIGHT */

        .right{

            width:50%;

            background:#111827;

            padding:60px;

            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .right h2{

            font-size:34px;

            margin-bottom:10px;
        }

        .subtitle{

            color:#94a3b8;

            margin-bottom:35px;
        }

        input{

            width:100%;

            padding:18px;

            margin-bottom:20px;

            border:none;

            outline:none;

            border-radius:14px;

            background:#0b1120;

            border:1px solid #1f2937;

            color:white;

            font-size:15px;
        }

        input:focus{
            border-color:#8b5cf6;
        }

        button{

            width:100%;

            padding:18px;

            border:none;

            border-radius:14px;

            background:linear-gradient(
                to right,
                #8b5cf6,
                #06b6d4
            );

            color:white;

            font-size:16px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
        }

        .bottom{

            margin-top:25px;

            text-align:center;

            color:#94a3b8;
        }

        .bottom a{

            color:#8b5cf6;

            text-decoration:none;
        }

    </style>

</head>

<body>

    <div class="container">

        <!-- LEFT -->

        <div class="left">

            <div class="logo">
                IdeaNeuron
            </div>

            <h1>
                Welcome Back
            </h1>

            <p>
                Continue analyzing project originality
                and build ideas that truly stand out.
            </p>

            <div class="feature">
                ✓ AI Similarity Detection
            </div>

            <div class="feature">
                ✓ Innovation Analytics
            </div>

            <div class="feature">
                ✓ Project Originality Tracking
            </div>

        </div>

        <!-- RIGHT -->

        <div class="right">

            <h2>Login</h2>

            <p class="subtitle">
                Access your AI dashboard
            </p>

            <form method="POST">

                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>

            <div class="bottom">

                Don't have an account?

                <a href="/signup">
                    Create Account
                </a>

            </div>

        </div>

    </div>

</body>

</html>
